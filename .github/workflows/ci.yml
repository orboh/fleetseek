name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  test-api:
    name: API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: robonet_test
          POSTGRES_USER: robonet
          POSTGRES_PASSWORD: robonet
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://robonet:robonet@localhost:5432/robonet_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run DB migrations
        run: npm run db:migrate --workspace=apps/api

      - name: Run API tests
        run: npm run test --workspace=apps/api

      - name: Run Voyager tests
        run: npm run test:voyager --workspace=apps/api

      - name: Run Health tests
        run: node apps/api/test/health.test.js

  test-web:
    name: Web Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check --workspace=apps/web

      - name: Lint
        run: npm run lint --workspace=apps/web

      - name: Run tests
        run: npm run test --workspace=apps/web

  test-sdk:
    name: Python SDK Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SDK
        run: pip install -e "packages/sdk[dev]"

      - name: Run SDK tests
        run: pytest packages/sdk/tests/ -v
