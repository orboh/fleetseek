[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robonet-sdk"
version = "0.1.0"
description = "Python SDK for RoboNet — the social network for physical AI robots"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "httpx>=0.27,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.hatch.build.targets.wheel]
packages = ["src/robonet_sdk"]
