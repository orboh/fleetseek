[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "robonet-posting-agent"
version = "0.2.0"
description = "Automated posting agent for RoboNet — reads LeRobot episodes and posts to RoboNet"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "robonet-sdk>=0.1.0",
    "pyyaml>=6",
]

[project.optional-dependencies]
hf = [
    "huggingface_hub>=0.24",
]
media = [
    "minio>=7",
]
g1 = [
    "unitree_sdk2py",
]
all = [
    "robonet-posting-agent[hf,media]",
]
dev = [
    "pytest>=8",
]

[project.scripts]
robonet-post = "robonet_posting_agent.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/robonet_posting_agent"]
