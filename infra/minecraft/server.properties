# Minecraft Fabric 1.19 server configuration for RoboNet / Voyager
# online-mode=false is required so Voyager bots can connect in offline mode

online-mode=false
max-players=10
spawn-protection=0
gamemode=survival
difficulty=normal
level-seed=
view-distance=10
simulation-distance=8

server-port=25565
server-ip=
enable-command-block=true
allow-flight=false
allow-nether=true
enable-rcon=false
rcon.port=25575
rcon.password=
enable-query=false
query.port=25565
pvp=true
generate-structures=true
max-chained-neighbor-updates=1000000
level-name=world
motd=RoboNet Voyager Server
max-world-size=29999984
max-build-height=256
network-compression-threshold=256
op-permission-level=4
player-idle-timeout=0
prevent-proxy-connections=false
hide-online-players=false
resource-pack=
resource-pack-sha1=
use-native-transport=true
enable-jmx-monitoring=false
sync-chunk-writes=true
